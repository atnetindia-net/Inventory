<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="A&T logo.png">
  <title>Inventory Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      width: 100%;
      min-height: 100vh;
      padding: 0 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f6f8fc;
    }

    .login_form {
      width: 100%;
      max-width: 435px;
      background: #fff;
      border-radius: 10px;
      padding: 41px 30px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .logo {
      text-align: center;
      margin: 0;
      padding: 0;
      line-height: 0;
    }

    .logo img {
      max-width: 160px;
      height: auto;
      display: inline-block;
    }

    .login_form .login_option {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }

    .login_form .login_option .option {
      width: calc(100% / 2 - 12px);
    }

    .login_form .login_option .option a {
      height: 56px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: #F8F8FB;
      border: 1px solid #DADAF2;
      border-radius: 10px;
      margin: 34px 0 24px 0;
      text-decoration: none;
      color: #171645;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .login_form .login_option .option a:hover {
      background: #ededf5;
      border-color: #f7b217;
    }

    .login_form p {
      text-align: center;
      font-weight: 500;
    }

    .login_form .separator {
      position: relative;
      margin-bottom: 24px;
    }

    .login_form .separator span {
      background: #fff;
      z-index: 1;
      padding: 0 10px;
      position: relative;
    }

    .login_form .separator::after {
      content: '';
      position: absolute;
      width: 100%;
      top: 50%;
      left: 0;
      height: 1px;
      background: #C2C2C2;
      display: block;
    }

    form .input_box label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
    }

    form .input_box input {
      width: 100%;
      height: 57px;
      border: 1px solid #DADAF2;
      border-radius: 10px;
      outline: none;
      background: #F8F8FB;
      font-size: 17px;
      padding: 0 20px;
      margin-bottom: 25px;
      transition: 0.2s ease;
    }

    form .input_box input:focus {
      border-color: #f7b217;
    }

    form .input_box .password_title {
      display: flex;
      justify-content: space-between;
      text-align: center;
    }

    form .input_box {
      position: relative;
    }

    a {
      text-decoration: none;
      color: #f7b217;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .option a i {
      font-size: 20px;
      margin-right: 8px;
    }

    form button {
      width: 100%;
      height: 56px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #ffcc3f;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 28px;
      transition: 0.3s ease;
    }

    form button:hover {
      background: #f7b217;
    }

    .login_form .login_option .option a.active {
      background: #ededf5;
      border-color: #f7b217;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login_form">
    <form action="#">
      <div class="logo">
        <img src="black.png" alt="Company Logo" />
      </div>

      <div class="login_option">
        <div class="option">
          <a href="#" id="userBtn" class="active">
            <i class="fa-solid fa-user"></i>
            <span>User</span>
          </a>
        </div>

        <div class="option">
          <a href="#" id="adminBtn">
            <i class="fa-solid fa-user-shield"></i>
            <span>Admin</span>
          </a>
        </div>
      </div>

<p class="separator">
  <span id="loginType">User Login</span>
</p>

      <div class="input_box">
        <label for="username" id="nameLabel">User Name</label>
        <input type="text" id="username" placeholder="Enter User Name" required />
      </div>

      <div class="input_box hidden" id="passwordBox">
        <div class="password_title">
          <label for="password">Password</label>
          <a href="#"></a>
        </div>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button type="submit" id="submitBtn">Continue</button>

      <p class="sign_up">Get started by Login your account</p>
    </form>
  </div>

  <script>

/* ============================= */
/* ELEMENTS */
/* ============================= */

const userBtn = document.getElementById("userBtn");
const adminBtn = document.getElementById("adminBtn");
const passwordBox = document.getElementById("passwordBox");
const nameLabel = document.getElementById("nameLabel");
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const loginType = document.getElementById("loginType");
const submitBtn = document.getElementById("submitBtn");

let mode = "user";

/* ============================= */
/* MODE SWITCH */
/* ============================= */

function setUserMode() {

  mode = "user";

  userBtn.classList.add("active");
  adminBtn.classList.remove("active");

  passwordBox.classList.add("hidden");

  nameLabel.textContent = "User Name";
  usernameInput.placeholder = "Enter User Name";
  loginType.textContent = "User Login";

  submitBtn.textContent = "Continue";

  passwordInput.required = false;
  passwordInput.value = "";
}

function setAdminMode() {

  mode = "admin";

  adminBtn.classList.add("active");
  userBtn.classList.remove("active");

  passwordBox.classList.remove("hidden");

  nameLabel.textContent = "Admin Name";
  usernameInput.placeholder = "Enter Admin Name";
  loginType.textContent = "Admin Login";

  submitBtn.textContent = "Login";

  passwordInput.required = true;
}

/* ============================= */
/* BUTTON EVENTS */
/* ============================= */

userBtn.addEventListener("click", function(e){
  e.preventDefault();
  setUserMode();
});

adminBtn.addEventListener("click", function(e){
  e.preventDefault();
  setAdminMode();
});

/* ============================= */
/* SIMPLE ENCODE FUNCTION */
/* ============================= */

function encode(str){
  return btoa(str); // base64 encode
}

/* ============================= */
/* HIDDEN CREDENTIALS */
/* ============================= */

// ""
const USER_ENCODED = "QWRtaW4=";

// ""
const PASS_ENCODED = "QWRtaW5AMTIz";

/* ============================= */
/* LOGIN BUTTON */
/* ============================= */

submitBtn.addEventListener("click", function(e){

  e.preventDefault();

  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();

  /* USER LOGIN */
  if(mode === "user"){

    if(username === ""){
      alert("Please enter your name");
      return;
    }

    window.location.href = "userpanel.html";
  }

  /* ADMIN LOGIN */
  if(mode === "admin"){

    if(
      encode(username) === USER_ENCODED &&
      encode(password) === PASS_ENCODED
    ){

      // Store session
      sessionStorage.setItem("isAdmin","true");

      window.location.href = "Adminpanel.html";

    }else{

      alert("Invalid Admin Credentials");

    }

  }

});

</script>
</body>
</html>
